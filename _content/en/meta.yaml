title: "Stop Sloppypasta: Don't paste raw LLM output at people"
description: "Sloppypasta: verbatim LLM output pasted at people. Why it's rude and what to do instead."

header:
  headword: "slop·py·pas·ta"
  pos: "n."
  definition: |
    Verbatim LLM output copy-pasted at someone, unread, unrefined, and unrequested.
    From _slop_ (low-quality AI-generated content) + _copypasta_ (text copied and pasted, often as a meme, without critical thought). It is considered rude because it asks the recipient to do work the sender did not bother to do themselves.

